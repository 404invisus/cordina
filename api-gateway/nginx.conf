worker_processes auto;
events { worker_connections 2048; }
http {
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    resolver 127.0.0.11 valid=10s;

    map $http_origin $cors_origin {
        default "";
        "~^http://localhost:3000$" $http_origin;
        "~^https://connectone\.id$" $http_origin;
        "~^https://www\.connectone\.id$" $http_origin;
    }

    server {
        listen 80;
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;

        location ~ ^/api/v1/permissions(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://svc-auth:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location ~ ^/api/v1/auth(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://svc-auth:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location ~ ^/api/v1/admin/(projects|tasks)(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://svc-project:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location ~ ^/api/v1/admin/calendar(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://svc-workload:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location ~ ^/api/v1/admin/workload(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://svc-workload:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location ~ ^/api/v1/admin(/.*)?$ {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://svc-auth:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/v1/users {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://svc-auth:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location ~ ^/api/v1/(projects|tasks|epics|stories|sprints|change-requests|task-assignees) {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://svc-project:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location ~ ^/api/v1/(workload|calendar) {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://svc-workload:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location ~ ^/api/v1/notifications {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://svc-notification:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location ~ ^/api/v1/reports {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://svc-reporting:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location ~ ^/api/v1/(storage|assets|documents|attendance) {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://svc-storage:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location ~ ^/api/v1/storage {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://svc-storage:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 20M;
        }
        location ~ ^/api/v1/internal/ {
            return 403;
        }
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
